name: Post to Vestaboard

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run post script
        env:
          VESTABOARD_KEY: ${{ secrets.VESTABOARD_KEY }}
        run: node post.js

      - name: Commit last_message.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_message.txt
          if ! git diff --staged --quiet; then
            git commit -m "chore: update last_message.txt"
            git push
          fi
